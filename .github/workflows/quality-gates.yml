name: Quality Gates

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

concurrency:
  group: quality-gates-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint + Typecheck
        run: npm run check

      # ─── i18n parity check ──────────────────────────────────────────────────
      # Blocks the build if any locale is missing keys from the EN baseline.
      # Run BEFORE `npm run build` so untranslated strings never reach production.
      - name: Check translation parity (all 10 locales)
        run: npm run check:i18n
        env:
          # Exit 0 on minor issues (extra keys, identical-to-EN warnings),
          # exit 1 only on critical issues (missing keys, broken interpolation).
          # Remove this env var to treat even minor issues as blocking.
          I18N_WARN_ONLY: "false"

      # Upload i18n report as an artifact for review (non-blocking step)
      - name: Generate i18n coverage report
        if: always()
        run: npm run check:i18n:report || true

      - name: Upload i18n report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: i18n-coverage-report
          path: i18n-report.json
          retention-days: 30
          if-no-files-found: ignore

      # ─── Build ──────────────────────────────────────────────────────────────
      - name: Build
        run: npm run build
