name: Quality Gates

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
      E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint + Typecheck
        run: npm run check

      - name: Build
        run: npm run build

      - name: Require pre-live smoke secrets
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          test -n "${E2E_USER_EMAIL}" || (echo "Missing E2E_USER_EMAIL secret" && exit 1)
          test -n "${E2E_USER_PASSWORD}" || (echo "Missing E2E_USER_PASSWORD secret" && exit 1)

      - name: Install Playwright Browser
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: npx playwright install --with-deps chromium

      - name: Pre-live Smoke Gate
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: npm run test:e2e:smoke
