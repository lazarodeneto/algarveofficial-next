name: Deploy & Smoke

on:
  push:
    branches:
      - main
      - "feat/**"
      - "fix/**"
  workflow_dispatch:
    inputs:
      base_url:
        description: "Base URL to test"
        required: false
        default: ""

concurrency:
  group: deploy-smoke-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      preview_url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Deploy to Vercel
        id: deploy
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-args: "--prebuilt"
          vercel-project: ${{ secrets.VERCEL_PROJECT_NAME }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}

  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: deploy

    env:
      PLAYWRIGHT_BASE_URL: ${{ needs.deploy.outputs.preview_url || github.event.inputs.base_url || 'http://localhost:3000' }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Run smoke tests
        run: npx playwright test tests/smoke.spec.ts
        env:
          CI: "true"