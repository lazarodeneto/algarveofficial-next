  <!-- Main crown shape -->
  <path d="M 40 120 L 70 80 L 100 140 L 128 70 L 156 140 L 186 80 L 216 120 C 220 130 222 140 220 150 L 220 170 Q 220 180 210 180 L 46 180 Q 36 180 36 170 L 36 150 Q 34 140 40 120 Z"
        fill="url(#goldGradient)" stroke="none"/>

