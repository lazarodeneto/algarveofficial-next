<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- Gold Crown Icon for Light Mode -->
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FDB913;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F5A623;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Left circle -->
  <circle cx="64" cy="80" r="24" fill="url(#goldGradient)"/>

  <!-- Center circle (top of crown) -->
